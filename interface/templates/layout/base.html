<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}App Money{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Aplicación de gestión financiera personal - Controla tus ingresos, gastos e inversiones">
    <meta name="theme-color" content="#121b33">

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" media="print" onload="this.media='all'">

    <!-- Favicon personalizado -->
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}" type="image/x-icon">
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.ico') }}" type="image/x-icon">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/app_money.png') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
</head>

<body>
    <a href="#main-content" class="skip-link">Saltar al contenido principal</a>
    <div class="page-background" aria-hidden="true"></div>

    <!-- Contenedor global de notificaciones -->
    <div id="toastContainer" role="alert" aria-live="polite" aria-label="Notificaciones"></div>

    {% if current_user.is_authenticated %}
    <div id="mobileMenuOverlay" class="mobile-menu-overlay" aria-hidden="true"></div>

    <nav class="navbar-custom" role="navigation" aria-label="Navegación principal">
        <!-- Hamburguesa (izquierda, solo móvil/tablet) -->
        <button
            id="mobileMenuToggle"
            class="mobile-menu-toggle lg:hidden"
            type="button"
            aria-label="Abrir menú de navegación"
            aria-expanded="false"
            aria-controls="navLinks">
            <i class="fas fa-bars" aria-hidden="true"></i>
        </button>

        <!-- Logo -->
        <span class="text-lg font-bold tracking-tight shrink-0">App Money</span>

        <!-- Links de navegación: drawer en móvil, inline en desktop -->
        <div id="navLinks" class="nav-links" role="menubar">
            <a href="/" class="nav-item" role="menuitem" {% if request.endpoint == 'main.consolidado' %}aria-current="page"{% endif %}>
                <i class="fas fa-chart-line" aria-hidden="true"></i>
                <span>Consolidado</span>
            </a>
            <a href="/registrar" class="nav-item" role="menuitem" {% if request.endpoint == 'main.registrar' %}aria-current="page"{% endif %}>
                <i class="fas fa-plus" aria-hidden="true"></i>
                <span>Registrar</span>
            </a>
            <a href="/reportes" class="nav-item" role="menuitem" {% if request.endpoint == 'main.reportes' %}aria-current="page"{% endif %}>
                <i class="fas fa-chart-line" aria-hidden="true"></i>
                <span>Reportes</span>
            </a>
            <a href="/buscar" class="nav-item" role="menuitem" {% if request.endpoint == 'main.buscar' %}aria-current="page"{% endif %}>
                <i class="fas fa-search" aria-hidden="true"></i>
                <span>Buscar</span>
            </a>
            <a href="/inversiones" class="nav-item" role="menuitem" {% if request.endpoint == 'main.inversiones' %}aria-current="page"{% endif %}>
                <i class="fas fa-piggy-bank" aria-hidden="true"></i>
                <span>Inversiones</span>
            </a>
            <a href="/metas" class="nav-item" role="menuitem" {% if request.endpoint == 'main.metas' %}aria-current="page"{% endif %}>
                <i class="fas fa-bullseye" aria-hidden="true"></i>
                <span>Metas</span>
            </a>
            <a href="/presupuestos" class="nav-item" role="menuitem" {% if request.endpoint == 'main.presupuestos' %}aria-current="page"{% endif %}>
                <i class="fas fa-wallet" aria-hidden="true"></i>
                <span>Presupuestos</span>
            </a>
            <a href="/recurrentes" class="nav-item" role="menuitem" {% if request.endpoint == 'main.recurrentes' %}aria-current="page"{% endif %}>
                <i class="fas fa-sync-alt" aria-hidden="true"></i>
                <span>Recurrentes</span>
            </a>
            <a href="/categorias" class="nav-item" role="menuitem" {% if request.endpoint == 'main.categorias' %}aria-current="page"{% endif %}>
                <i class="fas fa-folder-tree" aria-hidden="true"></i>
                <span>Categorías</span>
            </a>
        </div>

        <!-- Usuario (siempre a la derecha) -->
        <div class="flex items-center gap-4 shrink-0 ml-auto">
            <div class="dropdown">
                <button
                    id="userDropdownBtn"
                    type="button"
                    onclick="toggleDropdown()"
                    class="flex items-center gap-3 font-semibold text-sm hover:opacity-70 transition-opacity whitespace-nowrap"
                    aria-haspopup="true"
                    aria-expanded="false"
                    aria-controls="userDropdown">
                    {% if current_user.foto_perfil %}
                    <img src="{{ current_user.foto_perfil_url }}" alt="Foto de perfil de {{ current_user.nombre_usuario }}"
                        class="w-7 h-7 rounded-full object-cover border border-white/10">
                    {% else %}
                    <i class="fas fa-user-circle text-xl" aria-hidden="true"></i>
                    {% endif %}
                    <span>{{ current_user.nombre_usuario }}</span>
                    <i class="fas fa-chevron-down text-[10px] opacity-50" aria-hidden="true"></i>
                </button>
                <div id="userDropdown" class="dropdown-content" role="menu" aria-labelledby="userDropdownBtn">
                    <a href="/perfil" class="dropdown-item" role="menuitem">
                        <i class="fas fa-user-edit" aria-hidden="true"></i> Editar perfil
                    </a>
                    <a href="/preferencias" class="dropdown-item" role="menuitem">
                        <i class="fas fa-cog" aria-hidden="true"></i> Preferencias
                    </a>
                    <a href="/seguridad" class="dropdown-item" role="menuitem">
                        <i class="fas fa-shield-alt" aria-hidden="true"></i> Seguridad
                    </a>
                    <div class="h-[1px] bg-white/10 my-2" aria-hidden="true"></div>
                    <a href="/logout" class="dropdown-item text-red-500" role="menuitem">
                        <i class="fas fa-sign-out-alt" aria-hidden="true"></i> Salir
                    </a>
                </div>
            </div>
        </div>
    </nav>
    {% endif %}

    <main id="main-content" class="w-full" tabindex="-1">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Dropdown functionality
        function toggleDropdown() {
            const dropdown = document.getElementById("userDropdown");
            const button = document.getElementById("userDropdownBtn");
            if (!dropdown || !button) {
                return;
            }
            const isExpanded = dropdown.classList.toggle("show");
            button.setAttribute("aria-expanded", isExpanded ? "true" : "false");
        }

        // Cerrar dropdown cuando se hace clic fuera
        document.addEventListener("click", function(event) {
            const dropdown = document.getElementById("userDropdown");
            const button = document.getElementById("userDropdownBtn");
            if (!dropdown || !button) {
                return;
            }
            const dropdownContainer = event.target.closest(".dropdown");
            
            if (!dropdownContainer && dropdown.classList.contains("show")) {
                dropdown.classList.remove("show");
                button.setAttribute("aria-expanded", "false");
            }
        });

        // Cerrar dropdown con Escape
        document.addEventListener("keydown", function(event) {
            if (event.key === "Escape") {
                const dropdown = document.getElementById("userDropdown");
                const button = document.getElementById("userDropdownBtn");
                if (dropdown && dropdown.classList.contains("show")) {
                    dropdown.classList.remove("show");
                    button.setAttribute("aria-expanded", "false");
                    button.focus();
                }
                
                // Cerrar menú móvil también
                const navLinks = document.getElementById("navLinks");
                const menuToggle = document.getElementById("mobileMenuToggle");
                if (navLinks && navLinks.classList.contains("show")) {
                    navLinks.classList.remove("show");
                    if (menuToggle) {
                        menuToggle.setAttribute("aria-expanded", "false");
                    }
                    document.getElementById("mobileMenuOverlay")?.classList.remove("show");
                }
            }
        });

        // Mobile menu functionality
        (function() {
            const menuToggle = document.getElementById("mobileMenuToggle");
            const navLinks = document.getElementById("navLinks");
            const overlay = document.getElementById("mobileMenuOverlay");
            
            if (!menuToggle || !navLinks) return;
            
            function openMobileMenu() {
                navLinks.classList.add("show");
                overlay?.classList.add("show");
                menuToggle.setAttribute("aria-expanded", "true");
                menuToggle.setAttribute("aria-label", "Cerrar menú de navegación");
                menuToggle.querySelector("i")?.classList.replace("fa-bars", "fa-times");
                document.body.style.overflow = "hidden";
                // Focus first menu item
                const firstLink = navLinks.querySelector(".nav-item");
                if (firstLink) firstLink.focus();
            }
            
            function closeMobileMenu() {
                navLinks.classList.remove("show");
                overlay?.classList.remove("show");
                menuToggle.setAttribute("aria-expanded", "false");
                menuToggle.setAttribute("aria-label", "Abrir menú de navegación");
                menuToggle.querySelector("i")?.classList.replace("fa-times", "fa-bars");
                document.body.style.overflow = "";
                menuToggle.focus();
            }
            
            function toggleMobileMenu() {
                const isOpen = navLinks.classList.contains("show");
                if (isOpen) {
                    closeMobileMenu();
                } else {
                    openMobileMenu();
                }
            }
            
            menuToggle.addEventListener("click", toggleMobileMenu);
            
            overlay?.addEventListener("click", closeMobileMenu);
            
            // Close menu on window resize
            let resizeTimeout;
            window.addEventListener("resize", function() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(function() {
                    if (window.innerWidth >= 1024 && navLinks.classList.contains("show")) {
                        closeMobileMenu();
                    }
                }, 100);
            });
            
            // Keyboard navigation
            navLinks.addEventListener("keydown", function(event) {
                const items = Array.from(navLinks.querySelectorAll(".nav-item"));
                const currentIndex = items.indexOf(document.activeElement);
                
                if (event.key === "ArrowDown" || event.key === "ArrowRight") {
                    event.preventDefault();
                    const nextIndex = (currentIndex + 1) % items.length;
                    items[nextIndex]?.focus();
                } else if (event.key === "ArrowUp" || event.key === "ArrowLeft") {
                    event.preventDefault();
                    const prevIndex = (currentIndex - 1 + items.length) % items.length;
                    items[prevIndex]?.focus();
                } else if (event.key === "Home") {
                    event.preventDefault();
                    items[0]?.focus();
                } else if (event.key === "End") {
                    event.preventDefault();
                    items[items.length - 1]?.focus();
                }
            });
        })();
    </script>

    <script>
        // Renderizado de flashes desde Flask en el contenedor de toasts
        window.showToast = function(messageText, category = 'info') {
            const container = document.getElementById('toastContainer');
            if (!container || !messageText) return;

            const toast = document.createElement('div');
            toast.className = 'toast-item';
            toast.style.minWidth = '260px';
            toast.style.maxWidth = '420px';
            toast.style.padding = '12px 16px';
            toast.style.borderRadius = '10px';
            toast.style.boxShadow = '0 8px 24px rgba(0,0,0,0.4)';
            toast.style.fontWeight = '700';
            toast.style.fontSize = '0.95rem';
            toast.style.color = 'white';
            toast.style.backdropFilter = 'blur(6px)';
            toast.style.display = 'flex';
            toast.style.gap = '10px';
            toast.style.alignItems = 'center';

            if (category === 'error' || category === 'danger') {
                toast.style.background = 'linear-gradient(90deg,#ef4444,#dc2626)';
            } else if (category === 'warning' || category === 'warn') {
                toast.style.background = 'linear-gradient(90deg,#f59e0b,#d97706)';
            } else {
                toast.style.background = 'linear-gradient(90deg,#10b981,#06b6d4)';
            }

            const text = document.createElement('div');
            text.innerText = String(messageText).charAt(0).toUpperCase() + String(messageText).slice(1);
            text.style.flex = '1';

            const closeBtn = document.createElement('button');
            closeBtn.innerHTML = '&times;';
            closeBtn.style.background = 'transparent';
            closeBtn.style.border = 'none';
            closeBtn.style.color = 'rgba(255,255,255,0.9)';
            closeBtn.style.fontSize = '18px';
            closeBtn.style.cursor = 'pointer';

            closeBtn.addEventListener('click', () => {
                if (toast.parentNode) {
                    toast.parentNode.removeChild(toast);
                }
            });

            toast.appendChild(text);
            toast.appendChild(closeBtn);
            container.appendChild(toast);

            setTimeout(() => {
                if (toast.parentNode) {
                    toast.parentNode.removeChild(toast);
                }
            }, 3000);
        };

        (function () {
            const flashData = document.getElementById('flash-messages');

            if (!flashData) {
                return;
            }

            const messages = JSON.parse(flashData.textContent || '[]');

            if (!messages.length) {
                return;
            }

            messages.forEach((m) => {
                const category = m[0] || 'info';
                const messageText = m[1] || '';
                window.showToast(messageText, category);
            });
        })();
    </script>
</body>

</html>
