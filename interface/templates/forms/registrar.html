{% extends 'layout/base.html' %}
{% block title %}Registrar - App Money{% endblock %}
{% block content %}

<div class="fluent-card max-w-lg w-full flex flex-col items-center mx-auto">
    <h2 class="page-title mb-2 text-center text-white">Transacción</h2>
    <p class="text-center text-sm opacity-60 mb-10 text-slate-300">Agrega una nueva transacción a tu registro</p>

    <form method="post" class="space-y-6 w-full">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        
        <div class="form-group">
            <label class="form-label">Tipo de transacción</label>
            <select name="tipo" class="input-glass appearance-none cursor-pointer">
                <option value="ingreso">💰 Ingreso</option>
                <option value="gasto">💸 Gasto</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Categoría (opcional)</label>
            <select name="categoria_id" class="input-glass cursor-pointer" id="selectCategoria">
                <option value="">Sin categoría</option>
                {% for cat in categorias %}
                <option value="{{ cat.id }}" data-tipo="{{ cat.tipo }}">{{ cat.nombre }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Monto ({% if usuario and usuario.moneda == 'COP' %}{{ usuario.moneda }}{% else %}{{ usuario.moneda if usuario else 'USD' }}{% endif %})</label>
            <input type="number" step="0.01" name="monto" required class="input-glass" placeholder="0.00">
        </div>

        <div class="form-group">
            <label class="form-label">Descripción</label>
            <input type="text" name="descripcion" class="input-glass" placeholder="Opcional">
        </div>

        <div class="form-group">
            <label class="form-label">Fecha</label>
            <input type="date" name="fecha" required class="input-glass">
        </div>

        <div class="form-actions mt-8 w-full">
            <button type="submit" class="btn-fluent flex items-center justify-center gap-2">
                <i class="fas fa-check-circle"></i> Guardar
            </button>
        </div>
    </form>
</div>

<script>
    (function(){
        const tipoSelect = document.querySelector('select[name="tipo"]');
        const catSelect = document.getElementById('selectCategoria');

        if (!tipoSelect || !catSelect) return;

        function filtrarCategorias(){
            const tipo = tipoSelect.value;
            Array.from(catSelect.options).forEach(opt => {
                if (!opt.dataset.tipo) {
                    opt.hidden = false;
                    return;
                }
                opt.hidden = opt.dataset.tipo !== tipo;
            });
            if (catSelect.selectedOptions.length && catSelect.selectedOptions[0].hidden) {
                catSelect.value = '';
            }
        }

        tipoSelect.addEventListener('change', filtrarCategorias);
        filtrarCategorias();
    })();
</script>
{% endblock %}
