{% extends 'layout/base.html' %}
{% block title %}Editar Registro - App Money{% endblock %}
{% block content %}
<div class="fluent-card max-w-lg w-full flex flex-col items-center mx-auto">
    <h2 class="page-title mb-2 text-center text-white">Editar registro</h2>

    <form method="post" class="space-y-6 w-full mt-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="registro_id" value="{{ registro.id }}">
        <input type="hidden" name="tipo" value="{{ tipo }}">
        {% if return_to %}
        <input type="hidden" name="return_to" value="{{ return_to }}">
        <input type="hidden" name="return_query" value="{{ return_query }}">
        {% endif %}

        <div class="form-group">
            <label class="form-label">Tipo</label>
            <input type="text" value="{{ tipo|capitalize }}" disabled class="input-glass opacity-50 cursor-not-allowed text-slate-300">
        </div>

        <div class="form-group">
            <label class="form-label">Monto ({% if usuario and usuario.moneda == 'COP' %}{{ usuario.moneda }}{% else %}{{ usuario.moneda if usuario else 'USD' }}{% endif %})</label>
            <input type="number" step="0.01" name="monto" required value="{{ registro.monto }}" class="input-glass" placeholder="0.00">
        </div>

        <div class="form-group">
            <label class="form-label">Descripción</label>
            <input type="text" name="descripcion" value="{{ registro.descripcion }}" class="input-glass" placeholder="Descripción del registro">
        </div>

        <div class="form-group">
            <label class="form-label">Fecha</label>
            <input type="date" name="fecha" required value="{{ registro.fecha }}" class="input-glass">
        </div>

        <div class="form-group">
            <label class="form-label">Categoría</label>
            <select name="categoria_id" class="input-glass cursor-pointer">
                <option value="">Sin categoría</option>
                {% for cat in categorias %}
                    {% if cat.tipo == tipo %}
                        <option value="{{ cat.id }}" {% if registro.categoria_id and registro.categoria_id == cat.id %}selected{% endif %}>{{ cat.nombre }}</option>
                    {% endif %}
                {% endfor %}
            </select>
        </div>

          <div class="form-actions pt-4 flex-nowrap">
              <button type="submit" class="btn-fluent w-auto flex items-center justify-center gap-2">
                  <i class="fas fa-save"></i> Guardar
              </button>
              {% if return_to == 'buscar' %}
              <a href="{{ url_for('main.buscar') }}{% if return_query %}?{{ return_query }}{% endif %}" class="btn-fluent btn-blue w-auto flex items-center justify-center gap-2">
                  <i class="fas fa-times"></i> Cancelar
              </a>
              {% elif tipo == 'inversion' %}
              <a href="{{ url_for('main.inversiones') }}" class="btn-fluent btn-blue w-auto flex items-center justify-center gap-2">
                  <i class="fas fa-times"></i> Cancelar
              </a>
              {% else %}
              <a href="/registrar" class="btn-fluent btn-blue w-auto flex items-center justify-center gap-2">
                  <i class="fas fa-times"></i> Cancelar
              </a>
              {% endif %}
          </div>
    </form>
</div>
{% endblock %}
