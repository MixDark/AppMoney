{% extends 'layout/base.html' %}
{% block title %}Preferencias - App Money{% endblock %}
{% block content %}
<div class="fluent-card max-w-4xl w-full mx-auto shadow-soft">
    <h2 class="text-3xl font-black mb-10 text-center text-white">Preferencias</h2>

    <form method="post" class="space-y-8 mt-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="text" name="username" value="{{ usuario.nombre_usuario }}" autocomplete="username" readonly class="hidden">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 lg:gap-8 mb-8">
            <!-- Photo Section (Read Only in Preferences) -->
            <div class="md:col-span-1 flex flex-col items-center">
                <div class="relative mb-6">
                    <div class="w-24 h-24 sm:w-32 sm:h-32 rounded-full border-4 border-blue-500/30 flex items-center justify-center text-white text-3xl sm:text-5xl font-black shadow-xl overflow-hidden backdrop-blur-xl bg-surface select-none shrink-0">
                        {% if usuario.foto_perfil %}
                        <img src="{{ usuario_foto_url(usuario, usuario.id) }}" class="w-full h-full object-cover" alt="Foto de perfil">
                        {% else %}
                        {{ usuario.nombre_usuario[0].upper() }}
                        {% endif %}
                    </div>
                </div>
                <p class="text-xl font-black text-center text-white">{{ usuario.nombre_usuario }}</p>
            </div>

<!-- Options Section -->
            <div class="md:col-span-2 space-y-6">
                <!-- Password Change Section -->
                <div class="pt-6 sm:pt-10 border-t border-white/10 mt-6 space-y-4">
                    <h3 class="font-black text-lg mb-4 uppercase tracking-widest text-slate-300">Cambiar contraseña</h3>

                    <div class="form-group">
                        <label class="form-label">Contraseña actual</label>
                        <input type="password" name="password_actual" autocomplete="current-password" class="input-glass">
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="form-group">
                            <label class="form-label">Nueva contraseña</label>
                            <input type="password" name="password_nueva" autocomplete="new-password" class="input-glass">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Confirmar nueva contraseña</label>
                            <input type="password" name="password_confirmar" autocomplete="new-password" class="input-glass">
                        </div>
                    </div>
                </div>
            </div>
        </div>

         <!-- Botones -->
         <div class="form-actions pt-4 border-t border-white/10 flex-nowrap">
             <button type="submit" class="btn-fluent w-auto flex items-center justify-center gap-2">
                 <i class="fas fa-save"></i> Guardar
             </button>
              <a href="/" class="btn-fluent btn-blue w-auto flex items-center justify-center gap-2"><i class="fas fa-times"></i> Cancelar</a>
          </div>
     </form>
</div>

<script>
    // Preferencias page script
    (function() {
        // Page initialized
    })();
 </script>
{% endblock %}
