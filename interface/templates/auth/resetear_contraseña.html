{% extends 'layout/base.html' %}
{% block title %}Nueva Contraseña - App Money{% endblock %}
{% block body_class %}auth-page{% endblock %}
{% block content %}
<main class="w-full min-h-screen flex items-center justify-center overflow-hidden" tabindex="-1">
    <div class="fluent-card form-card p-6 sm:p-10 max-w-md w-full flex flex-col items-center shadow-soft">
        <h2 class="text-2xl font-black mb-6 text-center text-white">Cambio de contraseña</h2>

        <form method="post" action="{{ url_for('main.resetear_contraseña') }}" class="space-y-5 w-full flex flex-col items-center">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="hidden" name="token" value="{{ token }}">
            <input type="text" name="username" autocomplete="username" aria-hidden="true" tabindex="-1" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0">

             <div class="form-group">
                 <label class="form-label">Nueva contraseña</label>
                 <input type="password" name="password_nueva" required class="input-glass" autocomplete="new-password">
             </div>

             <div class="form-group">
                 <label class="form-label">Confirmar contraseña</label>
                 <input type="password" name="password_confirmar" required class="input-glass" autocomplete="new-password">
             </div>

             <button type="submit" class="btn-fluent w-auto flex items-center justify-center gap-2 mt-6">
                 <i class="fas fa-key"></i> Restablecer
             </button>
        </form>
        <div class="mt-6 text-center">
            <a href="/login" class="text-blue-400 hover:text-blue-300 text-xs font-bold transition-colors">Volver al login</a>
        </div>
    </div>
</main>
{% endblock %}
