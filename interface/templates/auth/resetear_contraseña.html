{% extends 'layout/base.html' %}
{% block title %}Nueva Contraseña - App Money{% endblock %}
{% block content %}
<div class="fluent-card form-card p-6 sm:p-10 max-w-md w-full flex flex-col items-center mx-auto shadow-soft">
    <h2 class="text-2xl font-black mb-6 text-center text-white">Cambio de contraseña</h2>

    <form method="post" action="{{ url_for('main.resetear_contraseña') }}" class="space-y-5 w-full flex flex-col">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="token" value="{{ token }}">

        <div class="form-group">
            <label class="form-label">Nueva contraseña</label>
            <input type="password" name="password_nueva" required class="input-glass">
        </div>

        <div class="form-group">
            <label class="form-label">Confirmar contraseña</label>
            <input type="password" name="password_confirmar" required class="input-glass">
        </div>

        <button type="submit" class="btn-fluent w-full flex items-center justify-center gap-2 mt-6">
            <i class="fas fa-key"></i> Restablecer
        </button>
    </form>
    <div class="mt-6 text-center">
        <a href="/login" class="text-blue-400 hover:text-blue-300 text-xs font-bold transition-colors">Volver al login</a>
    </div>
</div>
{% endblock %}
