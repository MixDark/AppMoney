{% extends 'layout/base.html' %}
{% block title %}Nueva Contraseña - App Money{% endblock %}
{% block content %}
<style>
    .form-label {
        display: block;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-secondary);
        margin-bottom: 5px;
    }
</style>

<div class="fluent-card form-card p-8 max-w-md w-full flex flex-col items-center">
    <h2 class="text-2xl font-black mb-6 text-center text-white">Cambio de contraseña</h2>

    {% if mensaje %}
    <p class="text-red-400 mb-6 text-center text-sm font-bold bg-red-500/10 py-3 px-4 rounded-lg w-full border border-red-500/30">
        {{ mensaje|capitalize }}
    </p>
    {% endif %}

    <form method="post" class="space-y-8 w-full flex flex-col">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="token" value="{{ token }}">

        <div class="w-full">
            <label class="form-label">Nueva contraseña</label>
            <input type="password" name="password_nueva" required class="input-glass">
        </div>

        <div class="w-full">
            <label class="form-label">Confirmar contraseña</label>
            <input type="password" name="password_confirmar" required class="input-glass">
        </div>

        <div class="w-full flex justify-center">
            <button type="submit" class="btn-fluent px-10 py-2 justify-center flex items-center gap-2 whitespace-nowrap text-sm">
                <i class="fas fa-key"></i> Restablecer
            </button>
        </div>
    </form>
    <div class="mt-6">
        <a href="/login" class="text-blue-400 hover:text-blue-300 text-xs font-bold">Volver al login</a>
    </div>
</div>
{% endblock %}
