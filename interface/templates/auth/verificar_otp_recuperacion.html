{% extends 'layout/base.html' %}
{% block title %}OTP de recuperación - App Money{% endblock %}
{% block content %}
<div class="fluent-card form-card p-6 sm:p-10 max-w-md w-full flex flex-col items-center mx-auto shadow-soft">
    <h2 class="text-2xl font-black mb-2 text-center text-white">Verificación OTP</h2>
    <p class="text-center text-xs font-bold uppercase tracking-widest opacity-60 mb-8 text-slate-300">Ingresa el código de tu app autenticadora para continuar</p>

    <form method="post" action="{{ url_for('main.verificar_otp_recuperacion') }}" class="space-y-6 w-full flex flex-col">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="token" value="{{ token }}">

        <div class="form-group">
            <label class="form-label text-center">Código OTP</label>
            <input type="text" name="codigo_otp" required maxlength="6" minlength="6" inputmode="numeric" autocomplete="off" spellcheck="false"
                class="input-glass text-center text-2xl font-black tracking-[0.4em] text-white">
        </div>

        <button type="submit" class="btn-fluent w-full flex items-center justify-center gap-2 mt-4">
            <i class="fas fa-shield-alt"></i> Verificar
        </button>
    </form>

    <div class="mt-6 text-center">
        <a href="{{ url_for('main.recuperar_contraseña') }}" class="text-blue-400 hover:text-blue-300 text-xs font-bold transition-colors">Volver al inicio</a>
    </div>
</div>
{% endblock %}
