{% extends 'layout/base.html' %}
{% block title %}OTP de recuperación - App Money{% endblock %}
{% block body_class %}auth-page{% endblock %}
{% block content %}
<main class="w-full min-h-screen flex items-center justify-center overflow-hidden" tabindex="-1">
    <div class="fluent-card form-card p-6 sm:p-10 max-w-md w-full flex flex-col items-center shadow-soft">
        <h2 class="text-2xl font-black mb-2 text-center text-white">Verificación OTP</h2>
        <p class="text-center text-xs font-bold uppercase tracking-widest opacity-60 mb-8 text-slate-300">Ingresa el código de tu app autenticadora para continuar</p>

        <form method="post" action="{{ url_for('main.verificar_otp_recuperacion') }}" class="space-y-6 w-full flex flex-col items-center">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="hidden" name="token" value="{{ token }}">
             <input type="text" name="username" value="{{ usuario_nombre|default('') }}" autocomplete="username" aria-hidden="true" tabindex="-1" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0">

            <div class="form-group">
                <label class="form-label text-center">Código OTP</label>
                <input type="text" name="codigo_otp" required maxlength="6" minlength="6" inputmode="numeric" autocomplete="off" spellcheck="false"
                    class="input-glass text-center text-2xl font-black tracking-[0.4em] text-white">
            </div>

             <button type="submit" class="btn-fluent w-auto flex items-center justify-center gap-2 mt-4">
                 <i class="fas fa-shield-alt"></i> Verificar
             </button>
        </form>

        <div class="mt-6 text-center">
            <a href="{{ url_for('main.recuperar_contraseña') }}" class="text-blue-400 hover:text-blue-300 text-xs font-bold transition-colors">Volver al inicio</a>
        </div>
    </div>
</main>
{% endblock %}
