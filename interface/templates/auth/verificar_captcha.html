{% extends 'layout/base.html' %}
{% block title %}CAPTCHA - App Money{% endblock %}
{% block content %}
<div class="fluent-card p-6 sm:p-10 max-w-sm w-full flex flex-col items-center mx-auto shadow-soft">
    <h2 class="text-3xl font-black mb-2 text-center text-white">Verificación</h2>
    <p class="text-center text-xs font-bold opacity-50 uppercase tracking-widest mb-8 text-slate-300">Resuelve el captcha para continuar</p>

    <form method="post" action="{{ url_for('main.verificar_captcha') }}" class="space-y-6 w-full flex flex-col">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" id="captcha-token" name="token" value="{{ token }}">

        <div class="w-full flex flex-col items-center bg-surface border border-blue-500/20 p-6 sm:p-8 rounded-3xl gap-5">
            <img id="captcha-image" src="{{ captcha_image }}" alt="Captcha visual" class="w-full max-w-[320px] rounded-2xl border border-white/10 shadow-soft select-none pointer-events-none" draggable="false">
            <input type="text" name="captcha_answer" required autofocus maxlength="6" minlength="6" autocomplete="off" autocapitalize="characters" spellcheck="false"
                class="input-glass text-center text-2xl font-black py-3 w-full uppercase tracking-[0.35em] text-white">
        </div>

        <button type="submit" class="btn-fluent w-full flex items-center justify-center gap-2 mt-4"><i class="fas fa-check"></i> Verificar</button>
    </form>
    
    <div class="mt-8 text-center">
        <div class="flex items-center justify-center gap-4 text-sm font-bold">
            <button type="button" id="refresh-captcha" data-refresh-url="{{ url_for('main.nuevo_captcha') }}" class="text-blue-400 hover:text-blue-300 bg-transparent p-0 border-0 font-bold transition-colors">Cambiar captcha</button>
            <span class="opacity-30">|</span>
            <a href="/recuperar_contraseña" class="text-blue-400 hover:text-blue-300 transition-colors">Volver atrás</a>
        </div>
    </div>
</div>

<script>
(() => {
    const refreshButton = document.getElementById('refresh-captcha');
    const captchaImage = document.getElementById('captcha-image');
    const captchaInput = document.querySelector('input[name="captcha_answer"]');
    const tokenInput = document.getElementById('captcha-token');
    const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';

    if (!refreshButton || !captchaImage || !tokenInput) {
        return;
    }

    const refreshUrl = refreshButton.dataset.refreshUrl;
    const captchaToken = tokenInput.value;

    const refreshCaptcha = async () => {
        refreshButton.disabled = true;
        try {
            const response = await fetch(refreshUrl, {
                method: 'POST',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest',
                    'X-CSRF-Token': csrfToken,
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: new URLSearchParams({ token: captchaToken })
            });
            const data = await response.json();

            if (!response.ok || !data.ok) {
                throw new Error(data.error || 'No se pudo recargar el captcha');
            }

            captchaImage.src = data.captcha_image;
            if (captchaInput) {
                captchaInput.value = '';
                captchaInput.focus();
            }
        } catch (error) {
            console.error(error);
        } finally {
            refreshButton.disabled = false;
        }
    };

    refreshButton.addEventListener('click', refreshCaptcha);
})();
</script>
{% endblock %}
