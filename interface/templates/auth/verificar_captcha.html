{% extends 'layout/base.html' %}
{% block title %}CAPTCHA - App Money{% endblock %}
{% block content %}
<style>
    .form-label {
        display: block;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-secondary);
        margin-bottom: 8px;
    }
    .captcha-box {
        background: var(--surface);
        border: 1px solid rgba(59, 130, 246, 0.2);
    }
</style>

<div class="fluent-card p-10 max-w-sm w-full flex flex-col items-center">
    <h2 class="text-3xl font-black mb-2 text-center text-white">Verificación</h2>
    <p class="text-center text-xs font-bold opacity-50 uppercase tracking-widest mb-10">Resuelve el captcha para continuar</p>

    <form method="post" class="space-y-8 w-full flex flex-col">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="token" value="{{ token }}">

        <div class="w-full flex flex-col items-center captcha-box p-8 rounded-3xl">
            <p class="text-3xl font-black mb-6 tracking-tighter">{{ captcha_num1 }} + {{ captcha_num2 }} = ?</p>
            <input type="number" name="captcha_answer" required autofocus
                class="input-glass text-center text-2xl font-black py-4 w-full">
        </div>

        <p class="text-center w-full text-xs font-black uppercase opacity-50 tracking-widest">
            Intentos: <span class="opacity-100">{{ captcha_attempt }}/3</span>
        </p>

        <div class="w-full flex justify-center">
            <button type="submit" class="btn-fluent justify-center py-4 flex items-center gap-2 whitespace-nowrap"><i class="fas fa-check"></i> Verificar</button>
        </div>
    </form>
    <div class="mt-8">
        <a href="/recuperar_contraseña" class="text-blue-400 hover:text-blue-300 text-sm font-bold">Volver atrás</a>
    </div>
</div>
{% endblock %}
