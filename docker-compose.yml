version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_money
    restart: always
    volumes:
      # Persistencia de imágenes de perfil
      - profiles_data:/app/interface/static/images/profiles    
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - DB_HOST=mysql
      - DB_USER=${DB_USER:-appuser}
      - DB_PASSWORD=${DB_PASSWORD:-apppass}
      - DB_NAME=${DB_NAME:-app_money}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=7700
      - SERVER_THREADS=${SERVER_THREADS:-4}

    networks:
      - proxy
      - appmoney

networks:
  proxy:
    external: true
  appmoney:
    external: true

volumes:
  profiles_data:
    name: app_money_profiles    